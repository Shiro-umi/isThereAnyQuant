<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- viewport-fit=cover 让内容延伸到刘海/灵动岛区域；
         interactive-widget=resizes-content 让软键盘弹起时收缩视口（100dvh 随之缩小），
         使居中表单自动上移避开键盘，避免输入框被键盘遮挡。 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
    
    <!-- 主题色：适配浏览器标题栏和系统状态栏 -->
    <!-- 三条 meta 的协同：
         · 无 media 的那条是 Chrome PWA standalone 模式下的"权威条目"——
           Android Chrome 在 PWA 启动后只追踪这一条的 content 变化来重绘状态栏；
         · 带 media 的两条用于普通浏览器标签下的暗/亮模式区分；
         · 三条都必须保持同步更新（见 LoadingChromeSync.js.kt）。 -->
    <meta name="theme-color" content="#1A110F">
    <meta name="theme-color" content="#1A110F" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#1A110F" media="(prefers-color-scheme: light)">
    
    <!-- iOS Safari 全屏配置 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <!-- black-translucent: 状态栏透明，内容延伸到状态栏下方 -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BigSmart">
    <meta name="application-name" content="BigSmart">
    
    <!-- Windows 手机配置 -->
    <meta name="msapplication-TileColor" content="#1A110F">
    <meta name="msapplication-tap-highlight" content="no">
    
    <title>BigSmart</title>
    
    <!-- PWA 配置 -->
    <link rel="manifest" href="manifest.json">
    
    <!-- 图标 -->
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    
    <!-- 样式 -->
    <link type="text/css" rel="stylesheet" href="styles.css">

    <!-- ========== 首屏主题同步：根据上次 Compose 写入的 localStorage 缓存，预先把 loading 层用色对齐到用户的主题 ========== -->
    <!--
        与 Kotlin 侧 syncLoadingChrome() 配对：localStorage key 为 'quant.theme.loading-chrome'，
        值为 JSON 对象，字段名对应去掉 '--loading-' 前缀的 CSS 变量名（bg / on-bg / primary / ...）。
        首次访问没有缓存时，CSS 变量回退到默认的 WarmBrownRed Dark 颜色值。
    -->
    <script>
        (function() {
            try {
                var raw = localStorage.getItem('quant.theme.loading-chrome');
                if (!raw) return;
                var tokens = JSON.parse(raw);
                var root = document.documentElement;
                for (var k in tokens) {
                    if (Object.prototype.hasOwnProperty.call(tokens, k)) {
                        root.style.setProperty('--loading-' + k, tokens[k]);
                    }
                }
                if (tokens.bg) {
                    var metas = document.querySelectorAll('meta[name="theme-color"]');
                    for (var i = 0; i < metas.length; i++) metas[i].setAttribute('content', tokens.bg);
                    var tile = document.querySelector('meta[name="msapplication-TileColor"]');
                    if (tile) tile.setAttribute('content', tokens.bg);
                }
            } catch (e) {}
        })();
    </script>

    <!-- ========== 首屏 Loading 层关键样式（阻塞渲染，确保立即显示）========== -->
    <!--
        Loading 层用色全部通过 `--loading-*` CSS 变量驱动，由顶部内联脚本根据 localStorage 注入；
        所有 `var()` 都带默认值（WarmBrownRed Dark token），首次访问无缓存时回退到原配色。
        新增或变更主题时无需改这里 —— Kotlin 侧 `syncLoadingChrome()` 会自动写入对应主题的 hex。
    -->
    <style>
        /* ===== 全屏容器 ===== */
        #app-loading {
            position: fixed;
            inset: 0;
            /* --loading-bg 由内联脚本根据 localStorage 缓存设置；未设置时回退默认背景 */
            background: var(--loading-bg, #1A110F);
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 1;
            visibility: visible;
            transition: opacity 0.4s cubic-bezier(0, 0, 0, 1),
                        visibility 0s linear 0s;
        }

        #app-loading.done {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity 0.4s cubic-bezier(0, 0, 0, 1),
                        visibility 0s linear 0.4s;
        }

        /* ===== 中央品牌区 ===== */
        .loading-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
        }

        .loading-brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .loading-brand-mark {
            width: 64px;
            height: 64px;
        }

        .loading-brand-name {
            font-family: system-ui, -apple-system, 'Segoe UI', 'PingFang SC', sans-serif;
            font-size: 22px;
            font-weight: 500;
            color: var(--loading-on-bg, #F1DFDA);
            letter-spacing: 0.5px;
        }

        /* MD3 Circular Indeterminate Indicator */
        .loading-spinner {
            width: 48px;
            height: 48px;
            animation: spinnerRotate 1.4s linear infinite;
        }

        .loading-spinner circle {
            fill: none;
            stroke: var(--loading-primary, #FFB5A0);
            stroke-width: 4;
            stroke-linecap: round;
            stroke-dasharray: 90, 150;
            stroke-dashoffset: 0;
            animation: spinnerDash 1.4s ease-in-out infinite;
        }

        @keyframes spinnerRotate {
            100% { transform: rotate(360deg); }
        }

        @keyframes spinnerDash {
            0% { stroke-dasharray: 1, 150; stroke-dashoffset: 0; }
            50% { stroke-dasharray: 90, 150; stroke-dashoffset: -35; }
            100% { stroke-dasharray: 90, 150; stroke-dashoffset: -124; }
        }

        /* 状态文字 */
        .loading-status {
            font-family: system-ui, -apple-system, 'Segoe UI', 'PingFang SC', sans-serif;
            font-size: 14px;
            font-weight: 400;
            color: var(--loading-on-bg-variant, #D8C2BC);
            letter-spacing: 0.25px;
            min-height: 20px;
        }

        /* 重置按钮（超时后显示） */
        .loading-reset {
            margin-top: 8px;
            padding: 10px 24px;
            background: var(--loading-surface-container-high, #322825);
            border: none;
            color: var(--loading-primary, #FFB5A0);
            border-radius: 20px;
            font-family: system-ui, -apple-system, 'PingFang SC', sans-serif;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.1px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            opacity: 0;
            transform: translateY(4px);
            transition: opacity 0.3s cubic-bezier(0, 0, 0, 1),
                        transform 0.3s cubic-bezier(0, 0, 0, 1),
                        background 0.2s cubic-bezier(0, 0, 0, 1);
            pointer-events: none;
        }

        .loading-reset.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .loading-reset:hover { background: var(--loading-surface-container-highest, #3D322F); }
        .loading-reset:active { background: var(--loading-outline-variant, #53433F); }

        /* ===== 右下角详情面板 ===== */
        .loading-panel {
            position: fixed;
            right: 16px;
            bottom: 16px;
            width: 320px;
            max-width: calc(100vw - 32px);
            background: var(--loading-surface-container, #271D1B);
            border: 1px solid var(--loading-outline-variant, #53433F);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            opacity: 0;
            transform: translateY(8px) scale(0.96);
            transition: opacity 0.3s cubic-bezier(0, 0, 0, 1),
                        transform 0.3s cubic-bezier(0, 0, 0, 1);
            pointer-events: none;
        }

        .loading-panel.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }

        .loading-panel-header {
            border-bottom: 0 solid transparent;
            transition: border-color 0.2s cubic-bezier(0, 0, 0.2, 1);
        }

        .loading-panel.expanded .loading-panel-header {
            border-bottom: 1px solid var(--loading-surface-container-high, #322825);
        }

        .loading-panel-toggle {
            appearance: none;
            border: 0;
            background: transparent;
            width: 100%;
            min-height: 44px;
            padding: 12px 12px 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            cursor: pointer;
            text-align: left;
        }

        .loading-panel-toggle:focus-visible {
            outline: 2px solid var(--loading-primary, #FFB5A0);
            outline-offset: -3px;
        }

        .loading-panel-summary {
            min-width: 0;
            display: flex;
            align-items: baseline;
            gap: 10px;
        }

        .loading-panel-actions {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .loading-panel-title {
            font-family: system-ui, -apple-system, 'Segoe UI', 'PingFang SC', sans-serif;
            font-size: 12px;
            font-weight: 500;
            color: var(--loading-on-bg-variant, #D8C2BC);
            letter-spacing: 0.4px;
        }

        .loading-panel-percent {
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            font-size: 12px;
            font-weight: 500;
            color: var(--loading-primary, #FFB5A0);
            font-variant-numeric: tabular-nums;
        }

        .loading-panel-chevron {
            width: 8px;
            height: 8px;
            border-right: 1.5px solid var(--loading-on-bg-variant, #D8C2BC);
            border-bottom: 1.5px solid var(--loading-on-bg-variant, #D8C2BC);
            transform: rotate(45deg);
            transition: transform 0.2s cubic-bezier(0, 0, 0.2, 1);
        }

        .loading-panel.expanded .loading-panel-chevron {
            transform: rotate(225deg);
        }

        .loading-panel-body {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: max-height 0.24s cubic-bezier(0, 0, 0.2, 1),
                        opacity 0.18s cubic-bezier(0, 0, 0.2, 1);
        }

        .loading-panel.expanded .loading-panel-body {
            max-height: 390px;
            opacity: 1;
        }

        /* 总进度条（面板内顶部） */
        .loading-track {
            height: 2px;
            background: var(--loading-surface-container-highest, #3D322F);
        }

        .loading-fill {
            height: 100%;
            width: 0%;
            background: var(--loading-primary, #FFB5A0);
            transition: width 0.12s linear;
        }

        /* 文件列表 */
        .loading-details {
            overflow-y: auto;
            padding: 8px 0;
            max-height: 240px;
        }

        .loading-details::-webkit-scrollbar { width: 4px; }
        .loading-details::-webkit-scrollbar-thumb {
            background: var(--loading-outline-variant, #53433F);
            border-radius: 2px;
        }

        .file-row {
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            font-size: 11px;
            color: var(--loading-on-bg-variant, #D8C2BC);
            padding: 6px 16px;
        }

        .file-row-head {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 4px;
        }

        .file-name {
            flex: 1;
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-variant-numeric: tabular-nums;
        }

        .file-meta {
            flex: 0 0 auto;
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        .file-speed {
            color: var(--loading-outline, #A08C87);
            font-size: 10px;
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
        }

        .file-size {
            flex: 0 0 auto;
            color: var(--loading-outline, #A08C87);
            font-size: 10px;
            font-variant-numeric: tabular-nums;
        }

        .file-bar {
            width: 100%;
            height: 2px;
            background: var(--loading-surface-container-highest, #3D322F);
            border-radius: 1px;
            overflow: hidden;
        }

        .file-bar-fill {
            height: 100%;
            width: 0%;
            background: var(--loading-primary, #FFB5A0);
            border-radius: 1px;
            transition: width 0.12s linear;
        }

        .file-row.done .file-name { color: var(--loading-outline, #A08C87); }
        .file-row.done .file-bar-fill { background: var(--loading-tertiary, #D8C58D); }
        .file-row.error .file-bar-fill { background: var(--loading-error, #FFB4AB); }

        /* 调试日志（面板底部） */
        .loading-debug {
            text-align: left;
            max-height: 120px;
            overflow-y: auto;
            background: var(--loading-surface-container-lowest, #140C0A);
            border-top: 1px solid var(--loading-surface-container-high, #322825);
            padding: 8px 12px;
            font-family: ui-monospace, 'SF Mono', Menlo, monospace;
            font-size: 10px;
            line-height: 1.5;
            color: var(--loading-on-bg-variant, #D8C2BC);
            display: none;
            word-break: break-all;
        }

        .loading-debug.visible { display: block; }
        .loading-debug .log-err { color: var(--loading-error, #FFB4AB); }
        .loading-debug .log-warn { color: var(--loading-tertiary, #D8C58D); }

        /* ===== 隐藏的兼容元素 ===== */
        #loading-pulse { display: none; }
        #loading-toggle { display: none; }

        /* ===== 移动端适配 ===== */
        @media (max-width: 480px) {
            .loading-panel {
                right: 8px;
                bottom: 8px;
                width: calc(100vw - 16px);
                border-radius: 12px;
            }

            .loading-panel.expanded .loading-panel-body {
                max-height: 40vh;
            }

            .loading-brand-mark { width: 48px; height: 48px; }
            .loading-brand-name { font-size: 20px; }
            .loading-spinner { width: 40px; height: 40px; }
        }
    </style>

    <!-- ========== 加载追踪与生命周期管理 ========== -->
    <script>
        // 屏幕日志 + 全局错误捕获：手机上没法看 console，把所有诊断信息写到页面上
        (function() {
            var pendingLogs = [];
            function tsNow() {
                var d = new Date();
                return d.getMinutes().toString().padStart(2,'0') + ':' +
                       d.getSeconds().toString().padStart(2,'0') + '.' +
                       d.getMilliseconds().toString().padStart(3,'0');
            }
            function appendToDebug(level, msg) {
                var el = document.getElementById('loading-debug');
                var line = '[' + tsNow() + '] ' + msg;
                if (!el) {
                    pendingLogs.push({ level: level, msg: line });
                    return;
                }
                el.classList.add('visible');
                while (pendingLogs.length) {
                    var p = pendingLogs.shift();
                    var d = document.createElement('div');
                    if (p.level === 'err') d.className = 'log-err';
                    else if (p.level === 'warn') d.className = 'log-warn';
                    d.textContent = p.msg;
                    el.appendChild(d);
                }
                var div = document.createElement('div');
                if (level === 'err') div.className = 'log-err';
                else if (level === 'warn') div.className = 'log-warn';
                div.textContent = line;
                el.appendChild(div);
                el.scrollTop = el.scrollHeight;
            }
            window.__quantLog = function(msg)  { try { console.log(msg);  } catch(e){}; appendToDebug('info', msg); };
            window.__quantWarn = function(msg) { try { console.warn(msg); } catch(e){}; appendToDebug('warn', msg); };
            window.__quantErr = function(msg)  { try { console.error(msg);} catch(e){}; appendToDebug('err',  msg); };

            function showLoadingError(msg) {
                try {
                    var s = document.getElementById('loading-status');
                    if (s) {
                        s.style.color = getComputedStyle(document.documentElement)
                            .getPropertyValue('--loading-error').trim() || '#FFB4AB';
                        s.textContent = msg;
                    }
                    var r = document.getElementById('loading-reset');
                    if (r) r.classList.add('visible');
                } catch (e) {}
            }
            window.addEventListener('error', function(ev) {
                var msg = (ev.message || 'unknown') + ' @ ' + (ev.filename || '?') + ':' + (ev.lineno || '?');
                window.__quantErr('window.error: ' + msg);
                showLoadingError('错误: ' + (ev.message || 'unknown'));
            });
            window.addEventListener('unhandledrejection', function(ev) {
                var r = ev.reason;
                var msg = r && (r.message || (r.toString && r.toString())) || 'unknown';
                window.__quantErr('unhandledrejection: ' + msg);
                showLoadingError('错误: ' + msg);
            });

            // 硬重置：unregister 所有 SW + 清所有 cache + 强刷
            window.__quantHardReset = async function() {
                window.__quantWarn('Hard reset triggered...');
                try {
                    if ('serviceWorker' in navigator) {
                        var regs = await navigator.serviceWorker.getRegistrations();
                        for (var i = 0; i < regs.length; i++) {
                            await regs[i].unregister();
                            window.__quantLog('SW unregistered: ' + regs[i].scope);
                        }
                    }
                    if (window.caches) {
                        var keys = await caches.keys();
                        for (var j = 0; j < keys.length; j++) {
                            await caches.delete(keys[j]);
                            window.__quantLog('Cache deleted: ' + keys[j]);
                        }
                    }
                } catch (e) {
                    window.__quantErr('reset error: ' + e);
                }
                window.__quantLog('Reloading...');
                setTimeout(function() {
                    // 加随机参数确保绕开 HTTP 缓存
                    var url = location.pathname + '?nocache=' + Date.now();
                    location.replace(url);
                }, 500);
            };
        })();

        (function() {
            (window.__quantLog || console.log)('[loading] script start, readyState=' + document.readyState);
            var L = window.__quantLog || function(m){console.log(m);};
            var E = window.__quantErr || function(m){console.error(m);};
            var W = window.__quantWarn || function(m){console.warn(m);};
            // 阈值：Content-Length 超过这个字节数才进入"按文件追踪"，避免被几百 B 的 chunk 干扰
            var TRACK_THRESHOLD_BYTES = 200 * 1024; // 200KB
            // 代码资源版本只跟随 compose-app.js / wasm 内容变化，避免壳资源变化触发大资源重下
            var ASSET_VERSION = '__CODE_VERSION__';
            // 主入口脚本路径
            var COMPOSE_APP_URL = 'compose-app.js?v=' + ASSET_VERSION;
            // 字体路径（相对于 index.html 所在目录）
            var FONT_BASE = 'composeResources/org.shiroumi.compose_app.generated.resources/font/';
            var PRELOAD_FONTS = [
                FONT_BASE + 'NotoSansSC-Regular.ttf',
                FONT_BASE + 'NotoSansSC-Bold.ttf',
                FONT_BASE + 'NotoColorEmoji.ttf'
            ];

            // 已知 url -> 友好显示名 的映射（提前给 compose-app.js 占位，让用户从 0 就看到这一行）
            var KNOWN_FILE_LABELS = {};
            KNOWN_FILE_LABELS[COMPOSE_APP_URL] = 'compose-app.js';

            var kotlinReady = false;
            var allFilesDone = false;
            var isComplete = false;

            // 文件追踪 map：key 是 url，value = { name, total, loaded, status, rowEl, fillEl, sizeEl }
            var files = Object.create(null);
            var fileOrder = [];

            var $ = function(id) { return document.getElementById(id); };

            function setPanelExpanded(expanded) {
                var panel = $('loading-panel');
                var toggle = $('loading-panel-toggle');
                if (!panel) return;
                panel.classList.toggle('expanded', expanded);
                if (toggle) {
                    toggle.setAttribute('aria-expanded', expanded ? 'true' : 'false');
                    toggle.setAttribute('title', expanded ? '折叠下载信息' : '展开下载信息');
                }
            }

            window.__quantToggleLoadingPanel = function() {
                var panel = $('loading-panel');
                if (!panel) return;
                setPanelExpanded(!panel.classList.contains('expanded'));
            };

            function fmtBytes(n) {
                if (!n && n !== 0) return '';
                if (n < 1024) return n + ' B';
                if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB';
                return (n / 1024 / 1024).toFixed(2) + ' MB';
            }

            function shortNameFromUrl(url) {
                if (KNOWN_FILE_LABELS[url]) return KNOWN_FILE_LABELS[url];
                try {
                    var clean = url.split('?')[0].split('#')[0];
                    var parts = clean.split('/');
                    return parts[parts.length - 1] || clean;
                } catch (e) {
                    return url;
                }
            }

            function urlFromFetchInput(input) {
                if (typeof input === 'string') return input;
                if (input && typeof input.url === 'string') return input.url;
                if (input && typeof input.href === 'string') return input.href;
                if (input && typeof input.toString === 'function') {
                    var value = input.toString();
                    if (value && value !== '[object Object]') return value;
                }
                return '';
            }

            function ensureRow(url) {
                var entry = files[url];
                if (!entry) return null;
                if (entry.rowEl) return entry;

                var list = $('loading-details');
                if (!list) return entry;

                var row = document.createElement('div');
                row.className = 'file-row';

                var head = document.createElement('div');
                head.className = 'file-row-head';

                var name = document.createElement('span');
                name.className = 'file-name';
                name.textContent = entry.name;

                var meta = document.createElement('span');
                meta.className = 'file-meta';

                var speed = document.createElement('span');
                speed.className = 'file-speed';

                var size = document.createElement('span');
                size.className = 'file-size';
                size.textContent = entry.total ? ('0 / ' + fmtBytes(entry.total)) : '...';

                meta.appendChild(speed);
                meta.appendChild(size);
                head.appendChild(name);
                head.appendChild(meta);

                var bar = document.createElement('div');
                bar.className = 'file-bar';
                var fill = document.createElement('div');
                fill.className = 'file-bar-fill';
                bar.appendChild(fill);

                row.appendChild(head);
                row.appendChild(bar);
                list.appendChild(row);

                entry.rowEl = row;
                entry.fillEl = fill;
                entry.sizeEl = size;
                entry.speedEl = speed;
                return entry;
            }

            function registerFile(url, total, opts) {
                var entry = files[url];
                if (entry) {
                    if (total && !entry.total) entry.total = total;
                    if (opts && opts.name) entry.name = opts.name;
                    return entry;
                }
                var now = performance.now();
                entry = {
                    url: url,
                    name: (opts && opts.name) || shortNameFromUrl(url),
                    total: total || 0,
                    loaded: 0,
                    status: 'pending',
                    lastSampleTime: now,
                    lastSampleLoaded: 0,
                    speed: 0
                };
                files[url] = entry;
                fileOrder.push(url);
                ensureRow(url);
                renderAll();
                return entry;
            }

            function updateFile(url, loaded, total) {
                var entry = files[url];
                if (!entry) return;
                if (total && !entry.total) entry.total = total;
                entry.loaded = loaded;
                if (entry.status === 'pending') entry.status = 'downloading';

                var now = performance.now();
                var dt = now - entry.lastSampleTime;
                if (dt >= 500) {
                    var db = loaded - entry.lastSampleLoaded;
                    entry.speed = db / (dt / 1000);
                    entry.lastSampleTime = now;
                    entry.lastSampleLoaded = loaded;
                }

                renderRow(entry);
                renderTotal();
            }

            function finishFile(url) {
                var entry = files[url];
                if (!entry) return;
                entry.status = 'done';
                entry.speed = 0;
                if (entry.total && entry.loaded < entry.total) entry.loaded = entry.total;
                renderRow(entry);
                renderTotal();
                checkAllDone();
            }

            function errorFile(url, err) {
                var entry = files[url];
                if (!entry) return;
                entry.status = 'error';
                entry.error = err;
                renderRow(entry);
                renderTotal();
                checkAllDone();
            }

            function fmtSpeed(bps) {
                if (!bps || bps <= 0) return '';
                if (bps < 1024) return bps.toFixed(0) + ' B/s';
                if (bps < 1024 * 1024) return (bps / 1024).toFixed(0) + ' KB/s';
                return (bps / 1024 / 1024).toFixed(1) + ' MB/s';
            }

            function renderRow(entry) {
                ensureRow(entry.url);
                if (!entry.fillEl) return;
                var pct = entry.total ? Math.min(100, (entry.loaded / entry.total) * 100) : 0;
                entry.fillEl.style.width = pct.toFixed(1) + '%';
                if (entry.sizeEl) {
                    if (entry.total) {
                        entry.sizeEl.textContent = fmtBytes(entry.loaded) + ' / ' + fmtBytes(entry.total);
                    } else {
                        entry.sizeEl.textContent = fmtBytes(entry.loaded);
                    }
                }
                if (entry.speedEl) {
                    entry.speedEl.textContent = (entry.status === 'downloading' && entry.speed > 0)
                        ? fmtSpeed(entry.speed) : '';
                }
                if (entry.rowEl) {
                    entry.rowEl.classList.toggle('done', entry.status === 'done');
                    entry.rowEl.classList.toggle('error', entry.status === 'error');
                }
            }

            function renderAll() {
                for (var i = 0; i < fileOrder.length; i++) {
                    var entry = files[fileOrder[i]];
                    if (entry) renderRow(entry);
                }
                renderTotal();
            }

            function renderTotal() {
                var totalSum = 0, loadedSum = 0, anyKnown = false;
                var loadedBytesNoTotal = 0;
                var doneCount = 0;
                var totalCount = fileOrder.length;
                for (var i = 0; i < fileOrder.length; i++) {
                    var entry = files[fileOrder[i]];
                    if (!entry) continue;
                    if (entry.status === 'done' || entry.status === 'error') doneCount++;
                    if (entry.total > 0) {
                        anyKnown = true;
                        totalSum += entry.total;
                        loadedSum += Math.min(entry.loaded, entry.total);
                    } else {
                        loadedBytesNoTotal += entry.loaded;
                    }
                }
                var pct;
                if (anyKnown) {
                    pct = (loadedSum / totalSum) * 100;
                } else if (totalCount > 0) {
                    var fileBased = (doneCount / totalCount) * 100;
                    var bytesBased = Math.min(80, loadedBytesNoTotal / 1024 / 1024 * 0.5);
                    pct = Math.max(fileBased, bytesBased);
                } else {
                    pct = 0;
                }

                var capped = Math.min(95, pct * 0.95);
                if (allFilesDone) capped = Math.max(capped, 95);
                if (kotlinReady && allFilesDone) capped = 100;

                var fillEl = $('loading-fill');
                var pctEl = $('loading-percent');
                if (fillEl) fillEl.style.width = capped.toFixed(1) + '%';
                if (pctEl) pctEl.textContent = Math.round(capped) + '%';

                // 显示右下角面板（有文件注册后）
                var panel = $('loading-panel');
                if (panel && totalCount > 0) panel.classList.add('visible');

                var statusEl = $('loading-status');
                if (statusEl && !isComplete) {
                    if (kotlinReady && allFilesDone) statusEl.textContent = '';
                    else if (allFilesDone) statusEl.textContent = '正在初始化…';
                    else statusEl.textContent = '';
                }
            }

            function checkAllDone() {
                if (allFilesDone) return;
                if (fileOrder.length === 0) return;
                for (var i = 0; i < fileOrder.length; i++) {
                    var entry = files[fileOrder[i]];
                    if (!entry) continue;
                    if (entry.status !== 'done' && entry.status !== 'error') return;
                }
                allFilesDone = true;
                renderTotal();
                maybeFinish();
            }

            function maybeFinish() {
                if (isComplete) return;
                if (!(kotlinReady && allFilesDone)) return;
                isComplete = true;
                renderTotal();
                setTimeout(function() {
                    var loader = $('app-loading');
                    if (!loader) return;
                    loader.classList.add('done');
                    setTimeout(function() {
                        if (loader.parentNode) loader.parentNode.removeChild(loader);
                    }, 400);
                }, 200);
            }

            // ========== 通用流式 fetch：包裹一个 fetch 调用，按字节回报进度 ==========
            //
            // 返回 { done } —— done Promise 在 body 整条流读完后 resolve。
            // 设计要点：
            //   - 内部用 reader.read() 自吃整条 body 来上报进度，response 不再被外部消费
            //   - 不返回包装 Response：经验上 Safari 在"trackedFetch 把原 body 取走 + 外层
            //     再 arrayBuffer()"这种二次消费时会抛 TypeError: Load failed（首次部署
            //     刷新稳定复现），干脆只暴露一个完成 Promise，杜绝外层误用
            //   - 调用方只需 await done 决定"下载完了"，不要碰 response body
            function trackedFetch(url, init, opts) {
                var displayName = (opts && opts.name) || shortNameFromUrl(url);
                // 提前注册（total 暂时未知）
                var entry = registerFile(url, 0, { name: displayName });

                var done = _origFetch.call(window, url, init).then(function(response) {
                    if (!response || !response.ok || !response.body) {
                        finishFile(url);
                        return;
                    }
                    var cl = response.headers.get('content-length');
                    var total = cl ? parseInt(cl, 10) : 0;
                    if (total) {
                        entry.total = total;
                        renderRow(entry);
                    }

                    var reader = response.body.getReader();
                    var loaded = 0;
                    return new Promise(function(resolve, reject) {
                        function pump() {
                            reader.read().then(function(result) {
                                if (result.done) {
                                    finishFile(url);
                                    resolve();
                                    return;
                                }
                                loaded += (result.value ? result.value.byteLength : 0);
                                updateFile(url, loaded, total);
                                pump();
                            }).catch(function(err) {
                                errorFile(url, err);
                                reject(err);
                            });
                        }
                        pump();
                    });
                }, function(err) {
                    errorFile(url, err);
                    throw err;
                });

                return { done: done };
            }

            var _origFetch = window.fetch.bind(window);

            // 拦截全局 fetch：仅对 .wasm 文件注入下载进度追踪。
            // 用 response.clone() 旁路读取 body 统计字节数，不影响原始 Response
            // 返回给调用方（Kotlin/Wasm 的 instantiateStreaming）。
            window.fetch = function(input, init) {
                var url = urlFromFetchInput(input);
                var clean = url.split('?')[0].split('#')[0];
                if (!clean.endsWith('.wasm')) return _origFetch(input, init);

                var displayName = shortNameFromUrl(url);
                registerFile(url, 0, { name: displayName });

                return _origFetch(input, init).then(function(response) {
                    if (!response || !response.ok || !response.body) {
                        finishFile(url);
                        return response;
                    }
                    var cl = response.headers.get('content-length');
                    var total = cl ? parseInt(cl, 10) : 0;
                    if (total) {
                        var entry = files[url];
                        if (entry) { entry.total = total; renderRow(entry); }
                    }

                    var sideChannel = response.clone();
                    var reader = sideChannel.body.getReader();
                    var loaded = 0;
                    (function pump() {
                        reader.read().then(function(result) {
                            if (result.done) { finishFile(url); return; }
                            loaded += (result.value ? result.value.byteLength : 0);
                            updateFile(url, loaded, total);
                            pump();
                        }).catch(function() { finishFile(url); });
                    })();

                    return response;
                }, function(err) {
                    errorFile(url, err);
                    throw err;
                });
            };

            // ========== 详情面板折叠/展开 ==========
            // ========== Kotlin 侧 ready 通知 ==========
            window.__quantAppReady = function() {
                kotlinReady = true;
                renderTotal();
                maybeFinish();
            };

            // ========== 主流程：预热字体、加载主脚本 ==========
            function bootstrap() {
                L('[loading] bootstrap() running');

                // 预先在列表里登记 compose-app.js（即使还没拿到 Content-Length）
                registerFile(COMPOSE_APP_URL, 0, { name: 'compose-app.js' });

                // 1) 字体并行预热：让它们和 compose-app.js 一起进入下载,而不是等渲染时才发请求
                //    trackedFetch 自己会把 body 流读完写入 HTTP/SW 缓存,这里不能再碰 response
                for (var i = 0; i < PRELOAD_FONTS.length; i++) {
                    var fontUrl = PRELOAD_FONTS[i];
                    registerFile(fontUrl, 0);
                    trackedFetch(fontUrl).done.catch(function(err) {
                        W('[loading] font preload failed: ' + (err && (err.message || err)));
                    });
                }

                // 2) 主脚本：用 <script src=...> 加载（让 webpack 通过 currentScript 正确推断 publicPath）
                //    先用 trackedFetch 预热到 SW/HTTP cache 并上报进度,等 done 后再插 <script>,
                //    走二级命中让 webpack runtime 能正确解析 wasm chunk URL
                trackedFetch(COMPOSE_APP_URL, { credentials: 'same-origin' }, { name: 'compose-app.js' })
                    .done
                    .then(function() {
                        L('[loading] compose-app.js prefetched, inserting <script>');
                        var s = document.createElement('script');
                        s.src = COMPOSE_APP_URL;
                        s.async = false;
                        s.onload = function() { L('[loading] compose-app.js executed'); };
                        s.onerror = function(e) {
                            E('[loading] compose-app.js script tag error');
                            var statusEl = $('loading-status');
                            if (statusEl) statusEl.textContent = '脚本执行失败';
                        };
                        document.head.appendChild(s);
                    })
                    .catch(function(err) {
                        E('[loading] failed to load compose-app.js: ' + (err && (err.message || err)));
                        var statusEl = $('loading-status');
                        if (statusEl) statusEl.textContent = '加载失败，请刷新';
                    });
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', bootstrap);
            } else {
                bootstrap();
            }

            // 终极兜底：超时只暴露诊断，不强制移除 Loading。
            setTimeout(function() {
                if (isComplete) return;
                W('[loading] timeout waiting for Kotlin ready; keeping loading overlay');
                var statusEl = $('loading-status');
                if (statusEl) {
                    statusEl.style.color = getComputedStyle(document.documentElement)
                        .getPropertyValue('--loading-error').trim() || '#FFB4AB';
                    statusEl.textContent = kotlinReady ? '初始化超时' : '加载超时';
                }
                var resetBtn = $('loading-reset');
                if (resetBtn) resetBtn.classList.add('visible');
            }, 30000);
        })();
    </script>

    <style>
        /* 根元素安全区域变量 */
        :root {
            --safe-area-top: env(safe-area-inset-top);
            --safe-area-right: env(safe-area-inset-right);
            --safe-area-bottom: env(safe-area-inset-bottom);
            --safe-area-left: env(safe-area-inset-left);
            /* App 颜色方案：转发到 loading 主题变量，实现首屏沉浸式背景与用户主题同步 */
            --app-background: var(--loading-bg, #1A110F);
            --app-surface: var(--loading-bg, #1A110F);
            --app-surface-container: var(--loading-surface-container, #271D1B);
            --app-navigation-bar: var(--loading-surface-container, #271D1B);
        }
        
        /* ========== 基础样式 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        /* ========== 沉浸式设计 ==========
         * 顶部状态栏区域：使用 app 背景色 (--app-background)
         * 底部导航栏区域：使用 app 导航栏颜色 (--app-navigation-bar)
         */
        body {
            /* 渐变背景：顶部背景色 -> 底部导航栏颜色 */
            background: linear-gradient(to bottom, 
                var(--app-background) 0%,
                var(--app-background) calc(100% - env(safe-area-inset-bottom)),
                var(--app-navigation-bar) calc(100% - env(safe-area-inset-bottom)),
                var(--app-navigation-bar) 100%);
        }
        
        /* 主容器：保留安全区域。
         * canvas 已改为跟随父容器布局（见 styles.css），所以这里的 padding 直接决定
         * Compose 视口大小。padding 精确等于 safe-area-inset-*，避免在 NavigationBar
         * 上方/状态栏下方留出多余空白。底部 padding 对应的物理区域显示 body 渐变底色
         * （--app-navigation-bar），与 Compose 内部 NavigationBar 同色融合形成沉浸观感。 */
        #compose-root {
            width: 100%;
            height: 100vh;
            height: 100dvh;
            padding-top: env(safe-area-inset-top);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* PWA standalone 与普通浏览器使用同一套沉浸式策略，无需差异化 */

        /* ========== 旧 WASM 加载进度条（兼容保留，已隐藏）========== */
        #wasm-loader {
            display: none !important;
        }

    <!-- Service Worker 注册 -->
    <script>
        // 立即检测 PWA 模式（在页面渲染前）
        (function detectPWA() {
            const isStandalone = window.matchMedia('(display-mode: standalone)').matches ||
                                window.navigator.standalone === true;
            if (isStandalone) {
                document.documentElement.classList.add('pwa-standalone');
                console.log('Running in PWA standalone mode');
            }
            return isStandalone;
        })();
        
        // 获取 PWA 状态
        function isPWA() {
            return document.documentElement.classList.contains('pwa-standalone');
        }
        
        // Service Worker 注册
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('sw.js?v=__SHELL_VERSION__')
                    .then(function(registration) {
                        console.log('ServiceWorker registration successful:', registration.scope);
                    })
                    .catch(function(err) {
                        console.log('ServiceWorker registration failed:', err);
                    });
            });
        }
        
        // PWA 安装提示逻辑
        let deferredPrompt = null;
        
        // 监听安装提示事件
        window.addEventListener('beforeinstallprompt', (e) => {
            // 阻止默认提示
            e.preventDefault();
            deferredPrompt = e;
            
            // 显示自定义安装提示
            showInstallPrompt();
        });
        
        // 显示安装提示
        function showInstallPrompt() {
            // 检查是否已经安装
            if (isPWA()) {
                return; // 已安装，不显示提示
            }
            
            // 检查是否是 iOS
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            
            if (isIOS) {
                // iOS 显示安装指引
                var iosGuide = document.getElementById('ios-install-guide');
                if (iosGuide) iosGuide.classList.add('show');
            } else if (deferredPrompt) {
                // Android/Chrome 显示安装按钮
                var installPrompt = document.getElementById('pwa-install-prompt');
                if (installPrompt) installPrompt.classList.add('show');
            }
        }
        
        // 安装应用
        async function installPWA() {
            if (!deferredPrompt) return;
            
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            
            if (outcome === 'accepted') {
                console.log('PWA installed');
                hideInstallPrompt();
            }
            
            deferredPrompt = null;
        }
        
        // 隐藏安装提示
        function hideInstallPrompt() {
            document.getElementById('pwa-install-prompt').classList.remove('show');
        }
        
        // 隐藏 iOS 指引
        function hideIOSGuide() {
            document.getElementById('ios-install-guide').classList.remove('show');
        }
        
        // 监听应用安装完成
        window.addEventListener('appinstalled', () => {
            console.log('PWA was installed');
            deferredPrompt = null;
            hideInstallPrompt();
            // 安装完成后立即添加 PWA 标记
            document.documentElement.classList.add('pwa-standalone');
        });
        
        // 监听显示模式变化
        window.matchMedia('(display-mode: standalone)').addEventListener('change', (e) => {
            if (e.matches) {
                document.documentElement.classList.add('pwa-standalone');
            } else {
                document.documentElement.classList.remove('pwa-standalone');
            }
        });
        
        // 页面加载完成后检查是否需要显示安装提示
        window.addEventListener('load', () => {
            
            // 延迟显示，避免影响首屏加载
            setTimeout(() => {
                // 检查本地存储，避免频繁提示
                const lastPrompt = localStorage.getItem('pwa-prompt-time');
                const now = Date.now();
                const oneWeek = 7 * 24 * 60 * 60 * 1000;
                
                if (!lastPrompt || (now - parseInt(lastPrompt)) > oneWeek) {
                    showInstallPrompt();
                    localStorage.setItem('pwa-prompt-time', now.toString());
                }
            }, 3000);
        });
    </script>

                <!-- Inline SVG：stroke 走 CSS 变量，跟随用户主题自适应。
                     与 brand-mark.svg 视觉一致；外链版本保留供 favicon / 其他静态引用。 -->
                <svg class="loading-brand-mark" viewBox="138 160 236 236" aria-hidden="true" focusable="false">
                    <g fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="24">
                        <path d="M190 332 V356 M242 294 V356 M294 256 V356"
                              stroke="var(--loading-on-bg-variant, #8F766E)"/>
                        <path d="M171 313 L228 256 L265 275 L341 199 M341 199 V265 M341 199 H275"
                              stroke="var(--loading-on-bg, #E4C8BF)"/>
                    </g>
                </svg>
                <span class="loading-brand-name">BigSmart</span>
            </div>
            <svg class="loading-spinner" viewBox="0 0 48 48">
                <circle cx="24" cy="24" r="20"/>
            </svg>
            <span class="loading-status" id="loading-status"></span>
            <button type="button" class="loading-reset" id="loading-reset"
                    onclick="window.__quantHardReset && window.__quantHardReset()">
                清除缓存并重载
            </button>
        </div>

        <!-- 右下角下载详情面板 -->
        <div class="loading-panel" id="loading-panel">
            <div class="loading-panel-header">
                <button type="button" class="loading-panel-toggle" id="loading-panel-toggle"
                        aria-expanded="false" title="展开下载信息"
                        onclick="window.__quantToggleLoadingPanel && window.__quantToggleLoadingPanel()">
                    <span class="loading-panel-summary">
                        <span class="loading-panel-title">下载信息</span>
                    </span>
                    <span class="loading-panel-actions">
                        <span class="loading-panel-percent" id="loading-percent">0%</span>
                        <span class="loading-panel-chevron" aria-hidden="true"></span>
                    </span>
                </button>
            </div>
            <div class="loading-panel-body" id="loading-panel-body">
                <div class="loading-track">
                    <div class="loading-fill" id="loading-fill"></div>
                </div>
                <div class="loading-details" id="loading-details"></div>
                <div class="loading-debug" id="loading-debug"></div>
            </div>
        </div>

        <!-- 兼容 JS 引用的隐藏元素 -->
        <div id="loading-pulse" style="display:none"></div>
        <button id="loading-toggle" style="display:none"></button>
    </div>

    <!-- Compose 挂载点 -->
    <div id="compose-root"></div>

    <!-- compose-app.js 由 head 中的进度追踪脚本通过 fetch + eval 加载，
         以便和字体一起进入按字节追踪的进度管线。-->
